; ============================================================
;  OpenTrack Profile for Forza Horizon 6 Head Tracking
;  Import via: OpenTrack > Profile > Import
; ============================================================

[Main]
version=2024
profile-name=FH6_HeadTracking

[tracker]
tracker=tobii-eyex

[tobii-eyex]
use-head-tracking=true
use-eye-tracking=false
smoothing=1

[output]
output=udp

[udp]
ip=127.0.0.1
port=4242

[filter]
filter=accela

[accela]
yaw-smoothness=15
pitch-smoothness=15
roll-smoothness=0

[mappings]
yaw-source=yaw
yaw-invert=false
yaw-scale=1.00
pitch-source=pitch
pitch-invert=false
pitch-scale=1.00
roll-scale=0.00
tx-scale=0.00
ty-scale=0.00
tz-scale=0.00

[yaw-curve]
point-0=0,0
point-1=45,45
point-2=90,90

[pitch-curve]
point-0=0,0
point-1=25,25
point-2=45,45
